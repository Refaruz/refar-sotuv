<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>REFAR — Kvartirangizni soting</title>
<meta name="description" content="Kvartirangizni REFAR orqali soting. Barcha xizmatlar bepul — to'lov faqat kvartira sotilganda. Toshkent va Farg'ona shahar.">
<style>
  @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@600;700&display=swap");
  :root{
    --ink:#1B2A4A;--ink-2:#33436a;--head:#1C2542;--red:#E24B4A;--red-dark:#c73b3a;
    --bg:#eef1f6;--surface:#ffffff;--line:#e2e6ef;--muted:#6b7488;--ok:#1f9d6b;
    --shadow:0 20px 55px -26px rgba(27,42,74,.5);--r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{font-family:"Manrope",system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  .refar-form{display:flex;justify-content:center;padding:26px 15px 40px}
  .rf-card{width:100%;max-width:530px;background:var(--surface);border-radius:calc(var(--r) + 6px);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line)}
  .rf-head{background:var(--head);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .rf-logo{height:34px;display:block}
  .rf-lang{display:flex;gap:2px;background:rgba(255,255,255,.10);border-radius:999px;padding:3px}
  .rf-lang button{border:0;background:transparent;cursor:pointer;font:600 12px "Manrope";color:rgba(255,255,255,.7);padding:5px 11px;border-radius:999px}
  .rf-lang button.on{background:#fff;color:var(--head)}
  .rf-prog{display:flex;gap:6px;padding:16px 22px 0}
  .rf-prog i{height:4px;flex:1;border-radius:999px;background:var(--line);transition:background .3s}
  .rf-prog i.done{background:var(--red)}
  .rf-body{padding:22px 22px 26px}
  .rf-eyebrow{font:700 11px "Manrope";letter-spacing:.14em;text-transform:uppercase;color:var(--red)}
  .rf-title{font-family:"Unbounded",sans-serif;font-weight:600;font-size:22px;line-height:1.22;margin:8px 0 4px}
  .rf-sub{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:18px}
  .rf-free{display:inline-flex;align-items:center;gap:7px;background:rgba(31,157,107,.10);color:var(--ok);font:700 12.5px "Manrope";padding:8px 13px;border-radius:999px;margin-bottom:16px}
  .rf-free .d{width:7px;height:7px;border-radius:50%;background:var(--ok)}
  .rf-steps{list-style:none;padding:0;margin:4px 0 16px;display:flex;flex-direction:column;gap:12px}
  .rf-steps li{display:flex;gap:12px;align-items:flex-start;font-size:14px;line-height:1.45;color:var(--ink-2)}
  .rf-num{flex:none;width:26px;height:26px;border-radius:8px;background:var(--head);color:#fff;font:700 12.5px "Manrope";display:grid;place-items:center;margin-top:1px}
  .rf-comm{background:rgba(27,42,74,.05);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:12px;padding:13px 15px;font-size:13.5px;line-height:1.5;color:var(--ink-2);margin-bottom:20px}
  .rf-comm b{color:var(--ink)}
  .rf-opts{display:flex;flex-direction:column;gap:10px}
  .rf-opt{display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid var(--line);border-radius:var(--r);background:#fff;cursor:pointer;text-align:left;width:100%;font:600 15.5px "Manrope";color:var(--ink);transition:border-color .15s,box-shadow .15s,transform .05s}
  .rf-opt:hover{border-color:var(--ink);box-shadow:0 8px 22px -16px rgba(27,42,74,.6)}
  .rf-opt:active{transform:scale(.995)}
  .rf-opt .ic{width:40px;height:40px;flex:none;border-radius:11px;background:rgba(27,42,74,.06);display:grid;place-items:center;color:var(--ink)}
  .rf-opt.warn .ic{background:rgba(226,75,74,.10);color:var(--red)}
  .rf-opt .arw{margin-left:auto;color:#c4cad8;transition:transform .15s,color .15s}
  .rf-opt:hover .arw{color:var(--ink);transform:translateX(3px)}
  .rf-field{margin-bottom:15px}
  .rf-label{display:block;font:600 13px "Manrope";margin-bottom:7px;color:var(--ink-2)}
  .rf-input,.rf-select{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font:500 15px "Manrope";color:var(--ink);background:#fff;outline:none;transition:border-color .15s}
  .rf-input:focus,.rf-select:focus{border-color:var(--ink)}
  .rf-phone{display:flex;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;transition:border-color .15s}
  .rf-phone:focus-within{border-color:var(--ink)}
  .rf-phone span{display:grid;place-items:center;padding:0 12px;background:var(--bg);font:600 15px "Manrope";color:var(--ink-2);border-right:1.5px solid var(--line)}
  .rf-phone input{flex:1;border:0;padding:13px 14px;font:500 15px "Manrope";outline:none;color:var(--ink)}
  .rf-chips{display:flex;flex-wrap:wrap;gap:8px}
  .rf-chip{border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:10px 16px;font:600 14px "Manrope";color:var(--ink);cursor:pointer;transition:.15s}
  .rf-chip:hover{border-color:var(--ink)}
  .rf-chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .rf-check{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);cursor:pointer;user-select:none;margin-top:9px}
  .rf-check input{width:17px;height:17px;accent-color:var(--red)}
  .rf-err{color:var(--red);font-size:12.5px;margin-top:6px;display:none}
  .rf-err.show{display:block}
  .rf-btn{width:100%;border:0;border-radius:13px;padding:15px;cursor:pointer;font:700 15.5px "Manrope";background:var(--red);color:#fff;transition:background .15s,transform .05s;margin-top:6px}
  .rf-btn:hover{background:var(--red-dark)}
  .rf-btn:active{transform:scale(.99)}
  .rf-btn:disabled{opacity:.6;cursor:default}
  .rf-btn.ghost{background:transparent;color:var(--ink-2);border:1.5px solid var(--line);margin-top:10px}
  .rf-btn.ghost:hover{border-color:var(--ink)}
  .rf-reassure{text-align:center;font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.4}
  .rf-back{background:none;border:0;color:var(--muted);font:600 13.5px "Manrope";cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;padding:4px 2px}
  .rf-back:hover{color:var(--ink)}
  .rf-note{background:rgba(27,42,74,.04);border:1px solid var(--line);border-radius:var(--r);padding:18px;color:var(--ink-2);font-size:14.5px;line-height:1.55;margin-bottom:18px}
  .rf-badge{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;margin-bottom:16px}
  .rf-badge.ok{background:rgba(31,157,107,.12);color:var(--ok)}
  .rf-badge.info{background:rgba(226,75,74,.10);color:var(--red)}
  .rf-soc-h{font:600 13px "Manrope";color:var(--ink-2);margin:4px 0 10px}
  .rf-contact{display:flex;gap:9px;margin-bottom:12px}
  .rf-contact a{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:12px;text-decoration:none;font:700 14px "Manrope"}
  .rf-contact a.call{background:var(--ink);color:#fff}
  .rf-contact a.wtg{background:#2AABEE;color:#fff}
  .rf-soc{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .rf-soc a{display:flex;align-items:center;gap:9px;padding:12px 13px;border:1.5px solid var(--line);border-radius:12px;text-decoration:none;color:var(--ink);font:600 13px "Manrope";transition:.15s}
  .rf-soc a:hover{border-color:var(--ink);background:#fafbfd}
  .rf-soc .si{width:26px;height:26px;flex:none;border-radius:7px;display:grid;place-items:center;color:#fff}
  .rf-soc .ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
  .rf-soc .tg{background:#2AABEE}
  .rf-soc small{display:block;color:var(--muted);font-weight:500;font-size:11px}
  .rf-foot{text-align:center;font-size:11.5px;color:#9aa2b4;padding:2px 22px 20px}
  .rf-screen{animation:rfIn .28s ease both}
  @keyframes rfIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.rf-screen{animation:none}}
</style>
</head>

const state={ lang:"uz", type:null, city:null, utm:{} };
const body=document.getElementById("rfBody");
const prog=document.getElementById("rfProg");
const foot=document.getElementById("rfFoot");
const t=()=>I18N[state.lang];

/* ---- UTM capture (targetolog uchun) ---- */
function captureUTM(){
  const p=new URLSearchParams(location.search), o={};
  ["utm_source","utm_medium","utm_campaign","utm_content","utm_term"].forEach(k=>{ if(p.get(k)) o[k]=p.get(k); });
  o.referrer=document.referrer||null;
  o.landing=location.href;
  state.utm=o;
}

/* ---- Tracking init (Meta Pixel + Yandex Metrika) ---- */
function initTracking(){
  const {metaPixelId,yandexMetrikaId}=CONFIG.track;
  if(metaPixelId){
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version="2.0";n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,"script","https://connect.facebook.net/en_US/fbevents.js");
    fbq("init",metaPixelId); fbq("track","PageView");
  }
  if(yandexMetrikaId){
    (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();
      for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r)return;}
      k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
      (window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");
    ym(yandexMetrikaId,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true});
  }
}
function trackLead(city){
  try{ if(window.fbq) fbq("track","Lead",{content_category:city}); }catch(e){}
  try{ if(window.ym && CONFIG.track.yandexMetrikaId) ym(CONFIG.track.yandexMetrikaId,"reachGoal","lead"); }catch(e){}
  try{ (window.dataLayer=window.dataLayer||[]).push({event:"refar_lead",city}); }catch(e){}
}

function setProg(step){
  if(!step){prog.style.display="none";return;}
  prog.style.display="flex";
  prog.querySelectorAll("i").forEach(i=>i.classList.toggle("done", +i.dataset.p<=step));
}
function render(html,step){
  body.innerHTML='<div class="rf-screen">'+html+'</div>';
  foot.textContent=t().footer;
  setProg(step);
}
function offSocials(){
  const s=CONFIG.social,L=t();
  return `<div class="rf-soc-h">${L.soc_head}</div>
    <div class="rf-soc">
      <a href="${s.ig_tosh}" target="_blank" rel="noopener"><span class="si ig">${ICN.ig}</span>Instagram<small>Toshkent</small></a>
      <a href="${s.tg_tosh}" target="_blank" rel="noopener"><span class="si tg">${ICN.tg}</span>Telegram<small>Toshkent</small></a>
      <a href="${s.ig_farg}" target="_blank" rel="noopener"><span class="si ig">${ICN.ig}</span>Instagram<small>Farg'ona</small></a>
      <a href="${s.tg_farg}" target="_blank" rel="noopener"><span class="si tg">${ICN.tg}</span>Telegram<small>Farg'ona</small></a>
    </div>`;
}

function intro(){
  state.type=null; state.city=null;
  const L=t();
  const steps=L.steps.map((s,i)=>`<li><span class="rf-num">${i+1}</span><span>${s}</span></li>`).join("");
  render(`
    <div class="rf-eyebrow">${L.intro_eyebrow}</div>
    <h1 class="rf-title">${L.intro_title}</h1>
    <div class="rf-free"><span class="d"></span>${L.intro_free}</div>
    <div class="rf-sub" style="margin-bottom:12px;font-weight:600;color:var(--ink)">${L.proc_title}</div>
    <ul class="rf-steps">${steps}</ul>
    <div class="rf-comm">${L.comm}</div>
    <button class="rf-btn" id="rfStartBtn">${L.start}</button>`, 0);
  document.getElementById("rfStartBtn").onclick=step1;
}
function step1(){
  state.type=null; state.city=null;
  const o=t().opt;
  const rows=[["kvartira",false],["hovli",true],["dacha",true],["ofis",true],["boshqa",true]]
    .map(([k,w])=>`<button class="rf-opt ${w?'warn':''}" data-type="${k}"><span class="ic">${ICN[k]}</span>${o[k]}${ARROW}</button>`).join("");
  render(`
    <button class="rf-back" data-back>&larr; ${t().back}</button>
    <div class="rf-eyebrow">${t().q1_eyebrow}</div>
    <h2 class="rf-title">${t().q1_title}</h2>
    <p class="rf-sub">${t().q1_sub}</p>
    <div class="rf-opts">${rows}</div>`, 1);
  body.querySelector("[data-back]").onclick=intro;
  body.querySelectorAll("[data-type]").forEach(b=>b.onclick=()=>{
    state.type=b.dataset.type;
    state.type==="kvartira" ? step2() : offType();
  });
}
function step2(){
  const c=t().city;
  const rows=[["toshkent",false],["fargona",false],["boshqa",true]]
    .map(([k,w])=>`<button class="rf-opt ${w?'warn':''}" data-city="${k}"><span class="ic">${ICN.pin}</span>${c[k]}${ARROW}</button>`).join("");
  render(`
    <button class="rf-back" data-back>&larr; ${t().back}</button>
    <div class="rf-eyebrow">${t().q2_eyebrow}</div>
    <h2 class="rf-title">${t().q2_title}</h2>
    <p class="rf-sub">${t().q2_sub}</p>
    <div class="rf-opts">${rows}</div>`, 2);
  body.querySelector("[data-back]").onclick=step1;
  body.querySelectorAll("[data-city]").forEach(b=>b.onclick=()=>{
    state.city=b.dataset.city;
    state.city==="boshqa" ? offLocation() : step3();
  });
}
function step3(){
  const L=t(), isTash=state.city==="toshkent";
  const distField = isTash
    ? `<select class="rf-select" id="rfDist"><option value="">${L.f_district_ph}</option>${L.districts.map(d=>`<option>${d}</option>`).join("")}</select>`
    : `<input class="rf-input" id="rfDist" placeholder="${L.f_district_fg_ph}">`;
  const rooms=["1","2","3","4+"].map(r=>`<button type="button" class="rf-chip" data-room="${r}">${r}</button>`).join("");
  render(`
    <button class="rf-back" data-back>&larr; ${L.back}</button>
    <div class="rf-eyebrow">${L.q3_eyebrow}</div>
    <h2 class="rf-title">${L.q3_title}</h2>
    <p class="rf-sub">${L.q3_sub}</p>
    <div class="rf-field"><label class="rf-label">${L.f_name}</label><input class="rf-input" id="rfName" placeholder="${L.f_name_ph}"><div class="rf-err" id="errName">${L.err_name}</div></div>
    <div class="rf-field"><label class="rf-label">${L.f_phone}</label><div class="rf-phone"><span>+998</span><input id="rfPhone" inputmode="numeric" placeholder="90 123 45 67" maxlength="9"></div><div class="rf-err" id="errPhone">${L.err_phone}</div></div>
    <div class="rf-field"><label class="rf-label">${isTash?L.f_district:L.f_district_fg}</label>${distField}</div>
    <div class="rf-field"><label class="rf-label">${L.f_rooms}</label><div class="rf-chips" id="rfRooms">${rooms}</div><div class="rf-err" id="errRooms">${L.err_rooms}</div></div>
    <div class="rf-field"><label class="rf-label">${L.f_price}</label><input class="rf-input" id="rfPrice" placeholder="${L.f_price_ph}"><label class="rf-check"><input type="checkbox" id="rfPriceX"> ${L.f_price_unknown}</label></div>
    <button class="rf-btn" id="rfSubmit">${L.submit}</button>
    <div class="rf-reassure">${L.reassure}</div>`, 3);
  body.querySelector("[data-back]").onclick=step2;
  let room=null;
  body.querySelectorAll("[data-room]").forEach(b=>b.onclick=()=>{
    room=b.dataset.room;
    body.querySelectorAll("[data-room]").forEach(x=>x.classList.toggle("on",x===b));
    document.getElementById("errRooms").classList.remove("show");
  });
  const phone=document.getElementById("rfPhone");
  phone.oninput=()=>{phone.value=phone.value.replace(/\D/g,"").slice(0,9);};
  const btn=document.getElementById("rfSubmit");
  btn.onclick=async ()=>{
    const name=document.getElementById("rfName").value.trim();
    const ph=phone.value.trim();
    let ok=true;
    const show=(id,c)=>{document.getElementById(id).classList.toggle("show",c); if(c)ok=false;};
    show("errName",name.length<2); show("errPhone",ph.length!==9); show("errRooms",!room);
    if(!ok)return;
    const priceX=document.getElementById("rfPriceX").checked;
    const cityKey=state.city;
    btn.disabled=true; btn.textContent=L.sending;
    await submit({
      status:"qualified", property_type:"kvartira",
      city: cityKey==="toshkent"?"Toshkent shahar":"Farg'ona shahar",
      name, phone:"+998"+ph,
      district: document.getElementById("rfDist").value || null,
      rooms:room,
      price: priceX ? null : (document.getElementById("rfPrice").value.trim()||null),
      price_negotiable: priceX
    });
    trackLead(cityKey);
    success(cityKey);
  };
}
function offType(){
  const L=t();
  render(`
    <button class="rf-back" data-back>&larr; ${L.back}</button>
    <div class="rf-badge info">${ICN.boshqa}</div>
    <h2 class="rf-title">${L.off_type_title}</h2>
    <div class="rf-note">${L.off_type_body.replace("{x}",L.opt[state.type])}</div>
    ${offSocials()}`, 0);
  body.querySelector("[data-back]").onclick=step1;
}
function offLocation(){
  const L=t();
  render(`
    <button class="rf-back" data-back>&larr; ${L.back}</button>
    <div class="rf-badge info">${ICN.pin}</div>
    <h2 class="rf-title">${L.off_loc_title}</h2>
    <div class="rf-note">${L.off_loc_body}</div>
    ${offSocials()}`, 0);
  body.querySelector("[data-back]").onclick=step2;
}
function success(cityKey){
  const L=t(), c=CONFIG.contacts[cityKey];
  render(`
    <div class="rf-badge ok"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    <h2 class="rf-title">${L.ok_title}</h2>
    <div class="rf-note">${L.ok_body}</div>
    <div class="rf-soc-h">${L.ok_contact_head}</div>
    <div class="rf-contact">
      <a class="call" href="tel:${c.tel}">${ICN.phone} ${L.call}</a>
      <a class="wtg" href="https://t.me/${c.tg_operator}" target="_blank" rel="noopener">${ICN.tg} ${L.write_tg}</a>
    </div>
    <div class="rf-soc">
      <a href="${c.ig}" target="_blank" rel="noopener"><span class="si ig">${ICN.ig}</span>Instagram<small>${L.city[cityKey]}</small></a>
      <a href="${c.tg_channel}" target="_blank" rel="noopener"><span class="si tg">${ICN.tg}</span>Telegram<small>${L.city[cityKey]}</small></a>
    </div>
    <button class="rf-btn ghost" onclick="RF_start()">${L.again}</button>`, 0);
}

async function submit(payload){
  payload.lang=state.lang;
  payload.utm=state.utm;
  payload.created_at=new Date().toISOString();
  try{
    const r=await fetch(CONFIG.apiEndpoint,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
  }catch(e){
    // Preview yoki server hali ulanmagan — ariza baribir ko'rsatiladi, konsolga yoziladi.
    console.log("[REFAR lead] server javob bermadi (preview?):", payload, e && e.message);
  }
}

document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>{
  state.lang=b.dataset.lang;
  document.querySelectorAll("[data-lang]").forEach(x=>x.classList.toggle("on",x===b));
  RF_start();
});
function RF_start(){ intro(); }

captureUTM();
initTracking();
RF_start();
</script>
